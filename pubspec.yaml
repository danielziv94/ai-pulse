name: ai_pulse
description: AI news reader with Gemini-powered summaries.
version: 1.0.3+4
publish_to: 'none'

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.1
  xml: ^6.5.0
  url_launcher: ^6.3.0
  share_plus: ^9.0.0
  shared_preferences: ^2.3.2
  flutter_local_notifications: ^17.2.2
  provider: ^6.1.2
  intl: ^0.19.0
  workmanager: ^0.9.0
  path_provider: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
